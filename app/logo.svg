<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.12" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#9A86FF"/>
      <stop offset="0.45" stop-color="#6D4AE6"/>
      <stop offset="1" stop-color="#3A1A80"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.32" cy="0.20" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#DED8F2"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#FF7A6E"/>
      <stop offset="0.55" stop-color="#FF3B30"/>
      <stop offset="1" stop-color="#D81E14"/>
    </radialGradient>
    <filter id="dropShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#180A3A" flood-opacity="0.38"/>
    </filter>
    <filter id="micShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#26105E" flood-opacity="0.30"/>
    </filter>
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#FF3B30" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- squircle с прозрачными углами -->
  <g filter="url(#dropShadow)">
    <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#bg)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#gloss)"/>
  <rect x="101" y="101" width="822" height="822" rx="187" fill="none"
        stroke="#ffffff" stroke-opacity="0.20" stroke-width="2"/>

  <!-- микрофон -->
  <g filter="url(#micShadow)">
    <rect x="440" y="322" width="144" height="250" rx="72" fill="url(#mic)"/>
    <path d="M398 500 C398 668, 626 668, 626 500" fill="none" stroke="url(#mic)"
          stroke-width="30" stroke-linecap="round"/>
    <path d="M512 636 L512 708" fill="none" stroke="url(#mic)"
          stroke-width="30" stroke-linecap="round"/>
    <path d="M456 712 L568 712" fill="none" stroke="url(#mic)"
          stroke-width="30" stroke-linecap="round"/>
  </g>

  <!-- record-глазок со свечением -->
  <circle cx="512" cy="410" r="39" fill="url(#dot)" filter="url(#dotGlow)"/>
  <circle cx="500" cy="398" r="11" fill="#ffffff" fill-opacity="0.55"/>
</svg>
